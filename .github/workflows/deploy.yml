name: Deploy (GHCR Publish)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      next_public_api_url:
        description: 'NEXT_PUBLIC_API_URL for the web client (e.g. https://api.tudominio.com)'
        required: true
        default: 'https://api.tudominio.com'

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository_owner }}/wolfiax-api
  IMAGE_WEB: ${{ github.repository_owner }}/wolfiax-web
  IMAGE_AI: ${{ github.repository_owner }}/wolfiax-ai-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_API }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}

      - name: Extract metadata (tags, labels) for Docker (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}

      - name: Extract metadata (tags, labels) for Docker (AI)
        id: meta-ai-service
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_AI }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Determine Web API URL
        id: web-api-url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api_url=${{ github.event.inputs.next_public_api_url }}" >> "$GITHUB_OUTPUT"
          else
            # Default fallback or dynamic extraction.
            # Puedes cambiar esto por tu dominio real si compilas por tag
            echo "api_url=https://api.tudominio.com" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.web-api-url.outputs.api_url }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI service image
        uses: docker/build-push-action@v6
        with:
          context: apps/ai-service
          file: infra/docker/ai-service.Dockerfile
          push: true
          tags: ${{ steps.meta-ai-service.outputs.tags }}
          labels: ${{ steps.meta-ai-service.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
