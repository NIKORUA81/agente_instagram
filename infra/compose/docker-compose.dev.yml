# Infraestructura local de desarrollo: SOLO Postgres y Redis.
# Las apps corren con `pnpm dev` fuera de Docker para hot-reload.
#
#   docker compose -f infra/compose/docker-compose.dev.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wolfiax-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Crea el rol de aplicación SIN superusuario para que Row-Level Security
      # se aplique en desarrollo exactamente igual que en producción.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wolfiax-redis
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
