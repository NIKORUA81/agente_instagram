# Producción en VPS (F0: web + api + postgres + redis + traefik).
# Requiere un archivo .env junto a este compose con:
#   DOMAIN_APP, DOMAIN_API, ACME_EMAIL, POSTGRES_PASSWORD, DATABASE_URL,
#   WEB_ORIGIN, JWT_PRIVATE_KEY_BASE64, JWT_PUBLIC_KEY_BASE64
#
#   docker compose -f infra/compose/docker-compose.prod.yml up -d

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/letsencrypt

  web:
    image: ghcr.io/wolfiax/social-ai-web:latest
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`${DOMAIN_APP}`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls.certresolver=le
      - traefik.http.services.web.loadbalancer.server.port=3000

  api:
    image: ghcr.io/wolfiax/social-ai-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: ${DATABASE_URL}
      WEB_ORIGIN: ${WEB_ORIGIN}
      COOKIE_SECURE: "true"
      JWT_PRIVATE_KEY_BASE64: ${JWT_PRIVATE_KEY_BASE64}
      JWT_PUBLIC_KEY_BASE64: ${JWT_PUBLIC_KEY_BASE64}
      SWAGGER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${DOMAIN_API}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=4000
      # Rate limit L7 defensivo delante del rate limit de la app
      - traefik.http.middlewares.api-ratelimit.ratelimit.average=100
      - traefik.http.middlewares.api-ratelimit.ratelimit.burst=200
      - traefik.http.routers.api.middlewares=api-ratelimit

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Sin ports: solo accesible desde la red interna de compose.
    # NOTA: el rol de aplicación (sin superusuario) se crea UNA vez a mano:
    #   CREATE ROLE wolfiax LOGIN PASSWORD '<fuerte>' NOSUPERUSER;
    #   CREATE DATABASE wolfiax OWNER wolfiax;
    #   \c wolfiax  →  CREATE EXTENSION IF NOT EXISTS vector;
    # y DATABASE_URL debe apuntar a ese rol (nunca al superusuario postgres).

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  traefik_acme:
  postgres_data:
  redis_data:
